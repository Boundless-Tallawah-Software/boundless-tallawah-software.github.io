---
layout: default
---

<article class="max-w-4xl mx-auto px-8 py-16">
  <header class="mb-12">
    <h1 class="text-5xl md:text-6xl font-bold text-primary mb-4">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="text-xl text-on-surface-variant">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  
  <div class="prose prose-lg max-w-none">
    {{ content }}
  </div>
</article>
